<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Tracker">
<meta name="theme-color" content="#0f0f0f">
<title>Gym Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--surface3:#2a2a2a;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#f0ede8;--text2:#888880;--text3:#555550;
    --accent:#c8f060;--accent-dim:rgba(200,240,96,0.12);--accent-border:rgba(200,240,96,0.3);
    --red:#ff5f5f;--red-dim:rgba(255,95,95,0.12);
    --radius:12px;--radius-sm:8px;
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px}
  #app{display:flex;flex-direction:column;height:100dvh;height:100vh}
  #header{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0}
  #header h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
  #header-right{display:flex;align-items:center;gap:10px}
  #session-date{font-size:12px;color:var(--accent);font-weight:500}
  #session-timer{font-family:var(--mono);font-size:12px;color:var(--text2)}
  #tabs{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0}
  .tab-btn{flex:1;padding:10px 4px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-count{display:inline-block;background:var(--surface3);color:var(--text2);font-size:11px;padding:1px 5px;border-radius:10px;margin-left:3px;vertical-align:middle}
  .tab-btn.active .tab-count{background:var(--accent-dim);color:var(--accent)}
  #panels{flex:1;overflow:hidden;position:relative}
  .panel{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
  .panel.active{display:block}
  button{font-family:var(--font);cursor:pointer;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;font-weight:500;transition:background 0.1s}
  button:active{background:var(--surface3)}
  button:disabled{opacity:0.3;pointer-events:none}
  input,select,textarea{font-family:var(--font);background:var(--surface2);color:var(--text);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:14px;width:100%;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--border2)}
  select option{background:#222}

  /* LIBRARY */
  #panel-library{padding:12px}
  .add-custom{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px}
  .add-custom-title{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
  .add-custom-row{display:flex;gap:8px}
  .add-custom-row input{flex:1}
  .add-custom-row select{width:auto}
  .add-custom-btn{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:600;padding:8px 14px;white-space:nowrap;flex-shrink:0}
  .filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none}
  .filter-scroll::-webkit-scrollbar{display:none}
  .filter-chip{white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);flex-shrink:0}
  .filter-chip.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
  .lib-search{margin-bottom:10px;position:relative}
  .lib-search input{padding-left:32px}
  .lib-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
  .lib-list{display:flex;flex-direction:column;gap:6px}
  .lib-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px}
  .lib-item.custom{border-left:2px solid var(--accent)}
  .lib-item-info{flex:1;min-width:0}
  .lib-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lib-item-muscle{font-size:12px;color:var(--text2);margin-top:1px}
  .lib-add-btn{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border);padding:6px 14px;font-size:13px;font-weight:600;flex-shrink:0;white-space:nowrap}
  .lib-del-btn{background:var(--red-dim);color:var(--red);border-color:rgba(255,95,95,0.25);padding:6px 10px;font-size:13px;flex-shrink:0}
  .lib-empty{text-align:center;padding:2rem 1rem;color:var(--text2);font-size:14px}

  /* WORKOUT */
  #panel-workout{padding:12px 12px 90px}
  .session-bar{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .session-bar-date{font-size:14px;font-weight:600;color:var(--accent)}
  .session-bar-meta{font-size:12px;color:var(--text2)}
  .finish-btn{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:700;font-size:13px;padding:8px 16px;white-space:nowrap;flex-shrink:0}
  .finish-btn:active{background:#b0d840}
  .workout-empty{text-align:center;padding:3rem 1.5rem;color:var(--text2)}
  .workout-empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3}
  .workout-empty p{font-size:14px;line-height:1.6}
  .ex-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color 0.15s}
  .ex-card.active-ex{border-color:var(--accent-border)}
  .ex-card.done-ex{opacity:0.5}
  .ex-header{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer}
  .ex-badge{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0;font-family:var(--mono)}
  .ex-card.active-ex .ex-badge{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
  .ex-card.done-ex .ex-badge{background:rgba(96,240,140,0.15);color:#60f08c;border-color:rgba(96,240,140,0.3)}
  .ex-header-info{flex:1;min-width:0}
  .ex-title{font-size:15px;font-weight:600;letter-spacing:-0.2px}
  .ex-subtitle{font-size:12px;color:var(--text2);margin-top:2px}
  .ex-move-btns{display:flex;gap:4px}
  .ex-move-btns button{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px}
  .ex-remove-btn{color:var(--text3);border-color:transparent;background:transparent}
  .ex-body{display:none;border-top:0.5px solid var(--border);padding:12px}
  .ex-card.active-ex .ex-body,.ex-card.done-ex .ex-body{display:block}
  .sets-head{display:grid;grid-template-columns:28px 1fr 1fr 1fr 36px;gap:6px;font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;text-align:center}
  .set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 36px;gap:6px;align-items:center;margin-bottom:6px}
  .set-idx{font-family:var(--mono);font-size:12px;color:var(--text3);text-align:center}
  .set-row input{height:36px;text-align:center;font-size:14px;font-family:var(--mono);padding:4px}
  .set-done-btn{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:var(--radius-sm)}
  .set-done-btn.checked{background:rgba(96,240,140,0.15);color:#60f08c;border-color:rgba(96,240,140,0.3)}
  .set-actions{display:flex;gap:8px;margin-top:6px;align-items:center;flex-wrap:wrap}
  .set-actions button{font-size:12px;padding:6px 12px}
  .rest-badge{margin-left:auto;display:flex;align-items:center;gap:5px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:13px;color:var(--text2)}
  .rest-val{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text);min-width:34px}
  .ex-note{width:100%;margin-top:10px;height:44px;resize:none;background:var(--surface2);font-size:13px}

  /* HISTORY */
  #panel-history{padding:12px 12px 20px}
  .hist-empty{text-align:center;padding:3rem 1.5rem;color:var(--text2);font-size:14px}
  .hist-session{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
  .hist-session-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;gap:10px}
  .hist-session-date{font-size:15px;font-weight:600;color:var(--accent)}
  .hist-session-meta{font-size:12px;color:var(--text2);margin-top:2px}
  .hist-session-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .hist-chevron{font-size:14px;color:var(--text3);transition:transform 0.2s}
  .hist-session.open .hist-chevron{transform:rotate(90deg)}
  .hist-del-btn{background:var(--red-dim);color:var(--red);border-color:rgba(255,95,95,0.25);padding:5px 10px;font-size:12px}
  .hist-body{display:none;border-top:0.5px solid var(--border);padding:12px}
  .hist-session.open .hist-body{display:block}
  .hist-ex{margin-bottom:12px}
  .hist-ex:last-child{margin-bottom:0}
  .hist-ex-name{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .hist-ex-muscle{font-size:11px;color:var(--text2);font-weight:400}
  .hist-set-row{display:grid;grid-template-columns:24px 1fr 1fr 1fr;gap:6px;font-size:12px;font-family:var(--mono);color:var(--text2);padding:3px 0;border-bottom:0.5px solid var(--border)}
  .hist-set-row:last-child{border-bottom:none}
  .hist-set-row span:first-child{color:var(--text3)}
  .hist-set-done{color:#60f08c}
  .hist-note{font-size:12px;color:var(--text2);font-style:italic;margin-top:4px}
  .hist-export-btn{width:100%;margin-top:10px;font-size:12px;padding:8px}

  /* BOTTOM BAR */
  #bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:none;gap:8px;z-index:10}
  #bottom-bar.show{display:flex}
  #bottom-bar button{flex:1;padding:10px;font-size:13px}
  .export-btn-accent{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}

  /* EXPORT MODAL */
  .export-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:20;padding:20px;align-items:flex-end}
  .export-modal.show{display:flex}
  .export-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
  .export-sheet h3{font-size:15px;font-weight:600;margin-bottom:12px}
  .export-content{background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-family:var(--mono);font-size:11px;color:var(--text2);white-space:pre;overflow-x:auto;max-height:40vh;overflow-y:auto;margin-bottom:12px;border:0.5px solid var(--border)}
  .export-close{width:100%;padding:12px;background:var(--surface3);color:var(--text);border-color:var(--border2);font-size:14px}

  /* FINISH CONFIRM MODAL */
  .confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:20;align-items:center;justify-content:center;padding:24px}
  .confirm-modal.show{display:flex}
  .confirm-sheet{background:var(--surface);border-radius:var(--radius);width:100%;padding:20px;max-width:360px}
  .confirm-sheet h3{font-size:16px;font-weight:600;margin-bottom:8px}
  .confirm-sheet p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
  .confirm-actions{display:flex;gap:10px}
  .confirm-actions button{flex:1;padding:11px}
  .confirm-yes{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:700}

  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>💪 Gym Tracker</h1>
    <div id="header-right">
      <span id="session-date"></span>
      <span id="session-timer"></span>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('library')" id="tab-library">Library</button>
    <button class="tab-btn" onclick="switchTab('workout')" id="tab-workout">Workout <span class="tab-count" id="wcount">0</span></button>
    <button class="tab-btn" onclick="switchTab('history')" id="tab-history">History <span class="tab-count" id="hcount">0</span></button>
  </div>
  <div id="panels">
    <!-- LIBRARY -->
    <div class="panel active" id="panel-library">
      <div style="padding:12px 12px 0">
        <div class="add-custom">
          <div class="add-custom-title">Add exercise to library</div>
          <div class="add-custom-row">
            <input type="text" id="custom-name" placeholder="Exercise name..." />
            <select id="custom-muscle">
              <option>Chest</option><option>Back</option><option>Shoulders</option>
              <option>Biceps</option><option>Triceps</option><option>Legs</option>
              <option>Glutes</option><option>Core</option><option>Cardio</option><option>Other</option>
            </select>
            <button class="add-custom-btn" onclick="addCustom()">+ Add</button>
          </div>
        </div>
        <div class="filter-scroll" id="filter-scroll"></div>
        <div class="lib-search">
          <span class="lib-search-icon">🔍</span>
          <input type="text" id="lib-search" placeholder="Search..." oninput="renderLib()" />
        </div>
      </div>
      <div style="padding:0 12px 80px">
        <div class="lib-list" id="lib-list"></div>
      </div>
    </div>

    <!-- WORKOUT -->
    <div class="panel" id="panel-workout">
      <div id="ex-list"></div>
      <div class="workout-empty" id="workout-empty">
        <div class="workout-empty-icon">🏋️</div>
        <p>No exercises yet.<br>Go to Library and tap <strong>+ Add</strong> to build your workout.</p>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="panel" id="panel-history">
      <div id="hist-list"></div>
      <div class="hist-empty" id="hist-empty" style="display:none">
        <p>No sessions saved yet.<br>Finish a workout to save it here.</p>
      </div>
    </div>
  </div>
</div>

<div id="bottom-bar">
  <button onclick="showExport('log')">Export log</button>
  <button class="export-btn-accent" onclick="showExport('csv')">Samsung CSV</button>
</div>

<div class="export-modal" id="export-modal" onclick="closeExport(event)">
  <div class="export-sheet">
    <h3 id="export-title"></h3>
    <div class="export-content" id="export-content"></div>
    <button class="export-close" onclick="closeExport()">Close</button>
  </div>
</div>

<div class="confirm-modal" id="confirm-modal">
  <div class="confirm-sheet">
    <h3>Finish session?</h3>
    <p>This will save your workout to History and clear the current session ready for next time.</p>
    <div class="confirm-actions">
      <button onclick="closeConfirm()">Cancel</button>
      <button class="confirm-yes" onclick="finishSession()">Save & finish</button>
    </div>
  </div>
</div>

<script>
const MUSCLES = ['All','Chest','Back','Shoulders','Biceps','Triceps','Legs','Glutes','Core','Cardio','Other'];
const DEFAULT = [
  {name:'Bench Press',muscle:'Chest'},{name:'Incline Bench Press',muscle:'Chest'},{name:'Chest Fly Machine',muscle:'Chest'},{name:'Cable Crossover',muscle:'Chest'},{name:'Pec Deck',muscle:'Chest'},
  {name:'Seated Row',muscle:'Back'},{name:'Lat Pulldown',muscle:'Back'},{name:'Cable Row',muscle:'Back'},{name:'Back Extension',muscle:'Back'},{name:'Assisted Pull-Up',muscle:'Back'},
  {name:'Shoulder Press Machine',muscle:'Shoulders'},{name:'Lateral Raise',muscle:'Shoulders'},{name:'Rear Delt Fly',muscle:'Shoulders'},{name:'Cable Face Pull',muscle:'Shoulders'},
  {name:'Bicep Curl Machine',muscle:'Biceps'},{name:'Cable Bicep Curl',muscle:'Biceps'},{name:'Preacher Curl',muscle:'Biceps'},{name:'Hammer Curl',muscle:'Biceps'},
  {name:'Tricep Press Machine',muscle:'Triceps'},{name:'Cable Tricep Pushdown',muscle:'Triceps'},{name:'Overhead Tricep Extension',muscle:'Triceps'},{name:'Skull Crusher',muscle:'Triceps'},
  {name:'Leg Press',muscle:'Legs'},{name:'Leg Extension',muscle:'Legs'},{name:'Leg Curl',muscle:'Legs'},{name:'Calf Raise Machine',muscle:'Legs'},{name:'Hack Squat',muscle:'Legs'},{name:'Smith Machine Squat',muscle:'Legs'},
  {name:'Abductor Machine',muscle:'Glutes'},{name:'Adductor Machine',muscle:'Glutes'},{name:'Hip Thrust Machine',muscle:'Glutes'},{name:'Glute Kickback',muscle:'Glutes'},
  {name:'Ab Crunch Machine',muscle:'Core'},{name:'Cable Crunch',muscle:'Core'},{name:'Plank',muscle:'Core'},{name:'Hanging Leg Raise',muscle:'Core'},
  {name:'Treadmill',muscle:'Cardio'},{name:'Rowing Machine',muscle:'Cardio'},{name:'Stationary Bike',muscle:'Cardio'},{name:'Cross Trainer',muscle:'Cardio'},
];

function load(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}

let library  = load('gtlib',null) || DEFAULT.map((e,i)=>({...e,id:'d'+i,custom:false}));
let workout  = load('gtworkout',[]);
let history  = load('gthistory',[]);
let sessionStart = load('gtsession', Date.now());
let restTimers = {};
let activeFilter = 'All';
let currentTab = 'library';

// If saved session is from a different calendar day, auto-archive it
(function checkDayRollover(){
  if (!workout.length) return;
  const saved = new Date(sessionStart);
  const now   = new Date();
  if (saved.toDateString() !== now.toDateString()) {
    archiveSession(false); // silent archive — don't clear, just save snapshot
  }
})();

function saveAll(){save('gtlib',library);save('gtworkout',workout);save('gthistory',history);save('gtsession',sessionStart)}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function fmtTime(ts){
  return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function fmtDuration(ms){
  const m=Math.floor(ms/60000),h=Math.floor(m/60);
  return h>0?`${h}h ${m%60}m`:`${m}m`;
}

// Update header date + timer
function updateHeader(){
  document.getElementById('session-date').textContent = fmtDate(sessionStart);
  const el = document.getElementById('session-timer');
  const s = Math.floor((Date.now()-sessionStart)/1000);
  const m = Math.floor(s/60), h = Math.floor(m/60);
  el.textContent = h>0?`${h}h ${m%60}m`:m>0?`${m}m`:'';
}
setInterval(updateHeader, 15000);
updateHeader();

function isCardio(ex){return ex.muscle==='Cardio'}
function muscleColor(m){
  const map={Chest:'#f06060',Back:'#6090f0',Shoulders:'#f0a060',Biceps:'#a060f0',Triceps:'#f060c0',Legs:'#60c0f0',Glutes:'#f0c060',Core:'#60f0a0',Cardio:'#c8f060'};
  return map[m]||'#888';
}

/* ── LIBRARY ── */
function addCustom(){
  const name=document.getElementById('custom-name').value.trim();
  if(!name)return;
  const muscle=document.getElementById('custom-muscle').value;
  if(library.find(e=>e.name.toLowerCase()===name.toLowerCase())){document.getElementById('custom-name').value='';return;}
  library.push({id:'c'+Date.now(),name,muscle,custom:true});
  saveAll();document.getElementById('custom-name').value='';renderLib();
}
function delFromLib(id){
  if(!confirm('Remove from library?'))return;
  library=library.filter(e=>e.id!==id);saveAll();renderLib();
}
function addToWorkout(id){
  const ex=library.find(e=>e.id===id);if(!ex)return;
  workout.push({wid:'w'+Date.now(),libId:id,name:ex.name,muscle:ex.muscle,sets:[{weight:'',reps:'',rir:'',done:false}],note:'',active:workout.length===0,completed:false});
  document.getElementById('wcount').textContent=workout.length;
  saveAll();
  const btn=document.querySelector(`[data-libid="${id}"]`);
  if(btn){btn.textContent='✓';btn.style.background='rgba(96,240,140,0.2)';btn.style.color='#60f08c';setTimeout(()=>{btn.textContent='+ Add';btn.style.background='';btn.style.color=''},900);}
}
function setFilter(m){activeFilter=m;renderLib()}
function renderLib(){
  const search=(document.getElementById('lib-search').value||'').toLowerCase();
  const filtered=library.filter(e=>(activeFilter==='All'||e.muscle===activeFilter)&&(!search||e.name.toLowerCase().includes(search)));
  document.getElementById('filter-scroll').innerHTML=MUSCLES.map(m=>`<button class="filter-chip ${m===activeFilter?'active':''}" onclick="setFilter('${m}')">${m}</button>`).join('');
  const list=document.getElementById('lib-list');
  if(!filtered.length){list.innerHTML='<div class="lib-empty">No exercises found.<br>Add one above.</div>';return;}
  list.innerHTML=filtered.map(e=>`
    <div class="lib-item ${e.custom?'custom':''}">
      <div class="lib-item-info">
        <div class="lib-item-name">${e.name}</div>
        <div class="lib-item-muscle"><span class="dot" style="background:${muscleColor(e.muscle)}"></span>${e.muscle}</div>
      </div>
      <button class="lib-add-btn" data-libid="${e.id}" onclick="addToWorkout('${e.id}')">+ Add</button>
      ${e.custom?`<button class="lib-del-btn" onclick="delFromLib('${e.id}')">✕</button>`:''}
    </div>`).join('');
}

/* ── WORKOUT ── */
function moveUp(wid){const i=workout.findIndex(e=>e.wid===wid);if(i>0){[workout[i-1],workout[i]]=[workout[i],workout[i-1]];saveAll();renderWorkout();}}
function moveDown(wid){const i=workout.findIndex(e=>e.wid===wid);if(i<workout.length-1){[workout[i+1],workout[i]]=[workout[i],workout[i+1]];saveAll();renderWorkout();}}
function removeEx(wid){
  workout=workout.filter(e=>e.wid!==wid);
  if(restTimers[wid]){clearInterval(restTimers[wid].iv);delete restTimers[wid];}
  document.getElementById('wcount').textContent=workout.length;saveAll();renderWorkout();
}
function toggleActive(wid){workout.forEach(e=>{if(e.wid===wid)e.active=!e.active});saveAll();renderWorkout();}
function addSet(wid){
  const ex=workout.find(e=>e.wid===wid);
  const s0=ex.sets[0];
  const cardio=isCardio(ex);
  let newSet={done:false};
  if(cardio){
    newSet.level=s0.level||''; newSet.speed=s0.speed||''; newSet.mins=s0.mins||'';
  } else {
    newSet.weight=s0.weight||''; newSet.reps=s0.reps||''; newSet.rir=s0.rir||'';
  }
  ex.sets.push(newSet);
  saveAll();renderWorkout();
}
function removeSet(wid){const ex=workout.find(e=>e.wid===wid);if(ex.sets.length>1){ex.sets.pop();saveAll();renderWorkout();}}
function toggleSetDone(wid,si){
  const ex=workout.find(e=>e.wid===wid);
  ex.sets[si].done=!ex.sets[si].done;
  ex.completed=ex.sets.every(s=>s.done);
  if(ex.sets[si].done&&!isCardio(ex))startRest(wid);
  saveAll();renderWorkout();
}
function updateField(wid,si,field,val){
  const ex=workout.find(e=>e.wid===wid);
  ex.sets[si][field]=val;
  if(si===0&&val!==''){
    for(let i=1;i<ex.sets.length;i++){
      if(!ex.sets[i][field]){
        ex.sets[i][field]=val;
        const inp=document.querySelector(`[data-wid="${wid}"][data-si="${i}"][data-field="${field}"]`);
        if(inp)inp.value=val;
      }
    }
  }
  saveAll();
}
function updateNote(wid,val){workout.find(e=>e.wid===wid).note=val;saveAll();}

function startRest(wid){
  if(restTimers[wid])clearInterval(restTimers[wid].iv);
  restTimers[wid]={secs:90};
  restTimers[wid].iv=setInterval(()=>{
    restTimers[wid].secs--;
    const el=document.getElementById('rv-'+wid);
    if(el)el.textContent=restTimers[wid].secs>0?restTimers[wid].secs+'s':'Go!';
    if(restTimers[wid].secs<=0)clearInterval(restTimers[wid].iv);
  },1000);
}

function renderWorkout(){
  const list=document.getElementById('ex-list');
  const empty=document.getElementById('workout-empty');
  const bar=document.getElementById('bottom-bar');
  if(!workout.length){list.innerHTML='';empty.style.display='block';bar.classList.remove('show');return;}
  empty.style.display='none';
  bar.classList.add('show');

  const doneCount=workout.filter(e=>e.completed).length;
  const sessionBar=`
    <div class="session-bar">
      <div>
        <div class="session-bar-date">${fmtDate(sessionStart)}</div>
        <div class="session-bar-meta">${doneCount}/${workout.length} exercises complete · ${fmtDuration(Date.now()-sessionStart)}</div>
      </div>
      <button class="finish-btn" onclick="openConfirm()">Finish ✓</button>
    </div>`;

  const cards=workout.map((ex,idx)=>{
    const cardio=isCardio(ex);
    const done=ex.sets.filter(s=>s.done).length;
    const restSecs=restTimers[ex.wid]?.secs;
    const restHtml=(!cardio&&restSecs!=null)?`<div class="rest-badge">⏱ Rest <span class="rest-val" id="rv-${ex.wid}">${restSecs>0?restSecs+'s':'Go!'}</span></div>`:'';
    const subtitleCount=cardio?`${done}/${ex.sets.length} ${done===1?'session':'sessions'}`:`${done}/${ex.sets.length} sets`;
    let headHtml,rows;
    if(cardio){
      headHtml=`<div class="sets-head" style="grid-template-columns:28px 1fr 1fr 1fr 36px"><span>#</span><span>Level</span><span>Speed</span><span>Mins</span><span></span></div>`;
      rows=ex.sets.map((s,si)=>`
        <div class="set-row" style="grid-template-columns:28px 1fr 1fr 1fr 36px">
          <span class="set-idx">${si+1}</span>
          <input type="number" inputmode="decimal" min="0" placeholder="Level" value="${s.level||''}" data-wid="${ex.wid}" data-si="${si}" data-field="level" onchange="updateField('${ex.wid}',${si},'level',this.value)" />
          <input type="number" inputmode="decimal" min="0" placeholder="km/h" value="${s.speed||''}" data-wid="${ex.wid}" data-si="${si}" data-field="speed" onchange="updateField('${ex.wid}',${si},'speed',this.value)" />
          <input type="number" inputmode="decimal" min="0" placeholder="mins" value="${s.mins||''}" data-wid="${ex.wid}" data-si="${si}" data-field="mins" onchange="updateField('${ex.wid}',${si},'mins',this.value)" />
          <button class="set-done-btn ${s.done?'checked':''}" onclick="toggleSetDone('${ex.wid}',${si})">${s.done?'✓':'○'}</button>
        </div>`).join('');
    }else{
      headHtml=`<div class="sets-head" style="grid-template-columns:28px 1fr 1fr 1fr 36px"><span>#</span><span>kg</span><span>Reps</span><span>RIR</span><span></span></div>`;
      rows=ex.sets.map((s,si)=>`
        <div class="set-row" style="grid-template-columns:28px 1fr 1fr 1fr 36px">
          <span class="set-idx">${si+1}</span>
          <input type="number" inputmode="decimal" min="0" placeholder="kg" value="${s.weight||''}" data-wid="${ex.wid}" data-si="${si}" data-field="weight" onchange="updateField('${ex.wid}',${si},'weight',this.value)" />
          <input type="number" inputmode="numeric" min="0" placeholder="reps" value="${s.reps||''}" data-wid="${ex.wid}" data-si="${si}" data-field="reps" onchange="updateField('${ex.wid}',${si},'reps',this.value)" />
          <input type="number" inputmode="numeric" min="0" placeholder="RIR" value="${s.rir||''}" data-wid="${ex.wid}" data-si="${si}" data-field="rir" onchange="updateField('${ex.wid}',${si},'rir',this.value)" />
          <button class="set-done-btn ${s.done?'checked':''}" onclick="toggleSetDone('${ex.wid}',${si})">${s.done?'✓':'○'}</button>
        </div>`).join('');
    }
    return `
    <div class="ex-card ${ex.active?'active-ex':''} ${ex.completed?'done-ex':''}">
      <div class="ex-header" onclick="toggleActive('${ex.wid}')">
        <div class="ex-badge">${ex.completed?'✓':idx+1}</div>
        <div class="ex-header-info">
          <div class="ex-title">${ex.name}</div>
          <div class="ex-subtitle"><span style="color:${muscleColor(ex.muscle)}">${ex.muscle}</span> · ${subtitleCount}</div>
        </div>
        <div class="ex-move-btns" onclick="event.stopPropagation()">
          <button onclick="moveUp('${ex.wid}')" ${idx===0?'disabled':''} style="font-size:18px;padding:0;width:32px;height:32px">↑</button>
          <button onclick="moveDown('${ex.wid}')" ${idx===workout.length-1?'disabled':''} style="font-size:18px;padding:0;width:32px;height:32px">↓</button>
          <button class="ex-remove-btn" onclick="removeEx('${ex.wid}')" style="font-size:16px;padding:0;width:32px;height:32px">✕</button>
        </div>
      </div>
      <div class="ex-body">
        ${headHtml}${rows}
        <div class="set-actions">
          <button onclick="addSet('${ex.wid}')">+ ${cardio?'Session':'Set'}</button>
          <button onclick="removeSet('${ex.wid}')">− ${cardio?'Session':'Set'}</button>
          ${restHtml}
        </div>
        <textarea class="ex-note" placeholder="Notes — pin setting, form cues..." onchange="updateNote('${ex.wid}',this.value)">${ex.note}</textarea>
      </div>
    </div>`;
  }).join('');

  list.innerHTML = sessionBar + cards;
}

/* ── FINISH / ARCHIVE ── */
function openConfirm(){document.getElementById('confirm-modal').classList.add('show');}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('show');}

function archiveSession(clearAfter=true){
  if(!workout.length)return;
  const record={
    id:'s'+Date.now(),
    date:sessionStart,
    duration:Date.now()-sessionStart,
    exercises:JSON.parse(JSON.stringify(workout))
  };
  history.unshift(record); // newest first
  if(history.length>120)history=history.slice(0,120); // keep up to 120 sessions
  if(clearAfter){
    workout=[];
    sessionStart=Date.now();
    save('gtsession',sessionStart);
    document.getElementById('wcount').textContent=0;
  }
  save('gthistory',history);
  save('gtworkout',workout);
  document.getElementById('hcount').textContent=history.length;
}

function finishSession(){
  closeConfirm();
  archiveSession(true);
  updateHeader();
  renderWorkout();
  renderHistory();
  switchTab('history');
}

/* ── HISTORY ── */
function renderHistory(){
  const list=document.getElementById('hist-list');
  const empty=document.getElementById('hist-empty');
  document.getElementById('hcount').textContent=history.length;
  if(!history.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML=history.map((s,si)=>{
    const exCount=s.exercises.length;
    const setCount=s.exercises.reduce((a,e)=>a+e.sets.filter(x=>x.done).length,0);
    const exList=s.exercises.map(ex=>{
      const cardio=ex.muscle==='Cardio';
      const setRows=ex.sets.map((set,i)=>{
        let cols;
        if(cardio){
          cols=`<span>Lvl ${set.level||'—'}</span><span>${set.speed||'—'} km/h</span><span>${set.mins||'—'} min</span>`;
        }else{
          cols=`<span>${set.weight||'—'}kg</span><span>${set.reps||'—'} reps</span><span>${set.rir?'RIR '+set.rir:''}</span>`;
        }
        return `<div class="hist-set-row"><span>${i+1}</span>${cols}<span class="${set.done?'hist-set-done':''}">${set.done?'✓':''}</span></div>`;
      }).join('');
      const noteHtml=ex.note?`<div class="hist-note">📝 ${ex.note}</div>`:'';
      return `<div class="hist-ex">
        <div class="hist-ex-name"><span class="dot" style="background:${muscleColor(ex.muscle)}"></span>${ex.name} <span class="hist-ex-muscle">${ex.muscle}</span></div>
        <div class="sets-head" style="grid-template-columns:24px 1fr 1fr 1fr 1fr;font-size:10px;margin-bottom:4px">
          <span>#</span>${cardio?'<span>Level</span><span>Speed</span><span>Mins</span>':'<span>kg</span><span>Reps</span><span>RIR</span>'}<span></span>
        </div>
        ${setRows}${noteHtml}
      </div>`;
    }).join('');
    return `
    <div class="hist-session" id="hs-${s.id}">
      <div class="hist-session-header" onclick="toggleHistSession('${s.id}')">
        <div>
          <div class="hist-session-date">${fmtDate(s.date)}</div>
          <div class="hist-session-meta">${fmtTime(s.date)} · ${fmtDuration(s.duration)} · ${exCount} exercises · ${setCount} sets done</div>
        </div>
        <div class="hist-session-right">
          <button class="hist-del-btn" onclick="event.stopPropagation();delSession('${s.id}')">✕</button>
          <span class="hist-chevron">›</span>
        </div>
      </div>
      <div class="hist-body">
        ${exList}
        <button class="hist-export-btn" onclick="showExportSession('${s.id}')">Export this session CSV</button>
      </div>
    </div>`;
  }).join('');
}

function toggleHistSession(id){
  document.getElementById('hs-'+id).classList.toggle('open');
}
function delSession(id){
  if(!confirm('Delete this session from history?'))return;
  history=history.filter(s=>s.id!==id);saveAll();renderHistory();
}

/* ── EXPORT ── */
function buildLogText(src, dateTs, durMs){
  let out=`WORKOUT LOG\n${fmtDate(dateTs)}  ${fmtTime(dateTs)}\nDuration: ${fmtDuration(durMs)}\n${'─'.repeat(36)}\n`;
  src.forEach((ex,i)=>{
    const cardio=ex.muscle==='Cardio';
    out+=`\n${i+1}. ${ex.name} (${ex.muscle})\n`;
    ex.sets.forEach((s,si)=>{
      if(cardio)out+=`   Session ${si+1}: Level ${s.level||'—'} · ${s.speed||'—'} km/h · ${s.mins||'—'} mins ${s.done?'✓':''}\n`;
      else out+=`   Set ${si+1}: ${s.weight||'—'}kg × ${s.reps||'—'} reps${s.rir?' RIR '+s.rir:''} ${s.done?'✓':''}\n`;
    });
    if(ex.note)out+=`   Note: ${ex.note}\n`;
  });
  return out;
}
function buildCSV(src, dateTs){
  const d=new Date(dateTs).toISOString().slice(0,10);
  let csv='Date,Exercise,Muscle group,Session,Weight (kg),Reps,RIR,Level,Speed (km/h),Duration (mins),Completed\n';
  src.forEach(ex=>{
    const cardio=ex.muscle==='Cardio';
    ex.sets.forEach((s,si)=>{
      if(cardio)csv+=`${d},"${ex.name}","${ex.muscle}",${si+1},,,,${s.level||''},${s.speed||''},${s.mins||''},${s.done?'Yes':'No'}\n`;
      else csv+=`${d},"${ex.name}","${ex.muscle}",${si+1},${s.weight||''},${s.reps||''},${s.rir||''},,,, ${s.done?'Yes':'No'}\n`;
    });
  });
  return csv;
}

function showExport(type){
  const modal=document.getElementById('export-modal');
  document.getElementById('export-title').textContent=type==='log'?`Workout log — ${fmtDate(sessionStart)}`:'Samsung Health CSV';
  document.getElementById('export-content').textContent=type==='log'
    ?buildLogText(workout,sessionStart,Date.now()-sessionStart)
    :buildCSV(workout,sessionStart);
  modal.classList.add('show');
}
function showExportSession(id){
  const s=history.find(x=>x.id===id);if(!s)return;
  const modal=document.getElementById('export-modal');
  document.getElementById('export-title').textContent=`Samsung CSV — ${fmtDate(s.date)}`;
  document.getElementById('export-content').textContent=buildCSV(s.exercises,s.date);
  modal.classList.add('show');
}
function closeExport(e){
  if(!e||e.target===document.getElementById('export-modal')||e.type==='click')
    document.getElementById('export-modal').classList.remove('show');
}

/* ── TABS ── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('bottom-bar').classList.toggle('show',tab==='workout'&&workout.length>0);
  if(tab==='workout')renderWorkout();
  if(tab==='library')renderLib();
  if(tab==='history')renderHistory();
}

// Init
renderLib();
renderWorkout();
renderHistory();
document.getElementById('wcount').textContent=workout.length;
document.getElementById('hcount').textContent=history.length;
</script>
